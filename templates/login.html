<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Access</title>

    <style>
        body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e0f2fe, #c7d2fe, #1e3a8a);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}
        .login-card {
            background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 16px;
    width: 380px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    color: white;
        }

        h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(99,102,241,0.3);
            background: rgba(30, 41, 59, 0.6);
            color: white;
            margin-bottom: 18px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99,102,241,0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99,102,241,0.4);
        }

        .note {
            font-size: 12px;
            margin-top: 15px;
            color: #94a3b8;
            text-align: center;
        }

        @media (max-width: 768px) {

    body {
        padding: 20px;
    }

    .login-card {
        width: 100%;
        max-width: 380px;
        padding: 28px;
    }

    .login-card h2 {
        font-size: 18px;
    }

    input {
        font-size: 14px;
    }

    button {
        font-size: 14px;
    }
}
    </style>
</head>

<body>

<div class="login-card">
    <h2>Secure Admin Access</h2>
    <div class="subtitle">
        Behavioral authentication layer active
    </div>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Any ID" required>
        <button type="submit">Access Secure Portal</button>
    </form>

    <div class="note">
        Please enter any ID to continue
    </div>
</div>

</body>
</html>
