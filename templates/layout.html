<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Manrope', sans-serif;
    display: flex;
    background: linear-gradient(135deg, #eef2ff, #f5f3ff 40%, #e0e7ff);
}

/* ================= Sidebar ================= */

.sidebar {
    width: 250px;
    min-height: 100vh;
    background: linear-gradient(to bottom, #1e1b4b, #2e2a74);
    color: white;
    padding: 35px 22px;
    transition: transform 0.3s ease;
}

.sidebar h2 {
    margin-bottom: 55px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
}

.sidebar a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    display: block;
    margin: 18px 0;
    font-size: 15px;
    font-weight: 600;
    transition: 0.25s;
}

.sidebar a:hover {
    color: white;
    transform: translateX(4px);
}

/* ================= Main ================= */

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* ================= Topbar ================= */

.topbar {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(14px);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

.topbar-title {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.3px;
    color: #0f172a;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    display: none;
}

/* ================= Status ================= */

.status-indicator {
    padding: 8px 18px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 600;
}

.trusted {
    background: #dcfce7;
    color: #166534;
}

.monitor {
    background: #ede9fe;
    color: #5b21b6;
}

.danger {
    background: #fee2e2;
    color: #7f1d1d;
}

/* ================= Content ================= */

.content {
    padding: 70px;
    flex: 1;
}

.page-card {
    background: #ffffff;
    padding: 55px;
    border-radius: 24px;
    max-width: 1000px;
    width: 100%;
    box-shadow: 0 30px 60px rgba(15,23,42,0.08);
}

.page-card h2 {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 25px;
    color: #0b132b;
}

.page-card p {
    color: #475569;
    line-height: 1.9;
    font-size: 16px;
    margin-bottom: 18px;
}

.page-card ul {
    margin-top: 20px;
    padding-left: 20px;
}

.page-card li {
    margin-bottom: 8px;
}

/* ================= Overlay ================= */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
}

/* ================= Responsive ================= */

@media (max-width: 768px) {

    body {
        flex-direction: column;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .menu-btn {
        display: block;
    }

    .overlay.active {
        display: block;
    }

    .content {
        padding: 25px;
    }

    .page-card {
        padding: 30px;
        border-radius: 18px;
    }

    .page-card h2 {
        font-size: 28px;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin Console</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/reports">Reports</a>
    <a href="/security">Security</a>
</div>

<div class="overlay" onclick="toggleMenu()"></div>

<div class="main">

<div class="topbar">
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="topbar-title">Secure Admin Portal</div>
    </div>
    <div id="top-status" class="status-indicator"></div>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</div>

<script>

function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

function updateTopStatus(risk) {
    let el = document.getElementById("top-status");
    el.className = "status-indicator";

    if (risk === "Trusted") {
        el.classList.add("trusted");
        el.innerText = "Session Secure";
    } else if (risk === "Monitoring") {
        el.classList.add("monitor");
        el.innerText = "Monitoring...";
    } else {
        el.classList.add("danger");
        el.innerText = "Verification Required";
    }
}

function fetchStatus() {
    fetch("/status")
    .then(res => res.json())
    .then(data => updateTopStatus(data.risk));
}

fetchStatus();
setInterval(fetchStatus, 800);

</script>

</body>
</html>
