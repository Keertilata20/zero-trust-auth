<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Admin Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    display: flex;
    background: linear-gradient(135deg, #eef2ff, #f5f3ff 40%, #e0e7ff);
}

/* Sidebar */

.sidebar {
    width: 240px;
    min-height: 100vh;
    background: linear-gradient(to bottom, #1e1b4b, #312e81);
    color: white;
    padding: 30px 20px;
    transition: transform 0.3s ease;
}

.sidebar h2 {
    margin-bottom: 50px;
    font-weight: 600;
}

.sidebar a {
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    display: block;
    margin: 18px 0;
    font-size: 15px;
    transition: 0.25s;
}

.sidebar a:hover {
    color: white;
}

/* Main */

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Topbar */

.topbar {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    padding: 18px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    display: none;
}

/* Status */

.status-indicator {
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 13px;
}

.trusted {
    background: #dcfce7;
    color: #166534;
}

.monitor {
    background: #ede9fe;
    color: #5b21b6;
}

.danger {
    background: #fee2e2;
    color: #7f1d1d;
}

/* Content */

.content {
    padding: 60px;
    flex: 1;
}

.page-card {
    background: white;
    padding: 45px;
    border-radius: 20px;
    max-width: 950px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.05);
}

.page-card h2 {
    font-weight: 700;
    font-size: 28px;
    margin-bottom: 20px;
}

/* Overlay */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* Responsive */

@media (max-width: 768px) {

    body {
        flex-direction: column;
    }

    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .menu-btn {
        display: block;
    }

    .overlay.active {
        display: block;
    }

    .content {
        padding: 20px;
    }

    .page-card {
        padding: 25px;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>Admin Console</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/reports">Reports</a>
    <a href="/security">Security</a>
</div>

<div class="overlay" onclick="toggleMenu()"></div>

<div class="main">

<div class="topbar">
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div>Secure Admin Portal</div>
    </div>
    <div id="top-status" class="status-indicator"></div>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</div>

<script>

function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

function updateTopStatus(risk) {
    let el = document.getElementById("top-status");
    el.className = "status-indicator";

    if (risk === "Trusted") {
        el.classList.add("trusted");
        el.innerText = "Session Secure";
    } else if (risk === "Monitoring") {
        el.classList.add("monitor");
        el.innerText = "Monitoring...";
    } else {
        el.classList.add("danger");
        el.innerText = "Verification Required";
    }
}

function fetchStatus() {
    fetch("/status")
    .then(res => res.json())
    .then(data => updateTopStatus(data.risk));
}

fetchStatus();
setInterval(fetchStatus, 800);

</script>

</body>
</html>
